{% extends "layouts/base.html" %}
{% block title %}تسجيل جديد{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <img src="/static/img/eagle.svg" alt="شعار" style="height:50px;">
    <h5 class="text-syria-green mt-2" style="font-weight:bold;">هيئة دعم وتنمية الإنتاج المحلي والصادرات</h5>
</div>
<div class="row justify-content-center" style="width:100%;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow login-card">
            <div class="card-header bg-syria-black text-white text-center">
                <h4 class="mb-0">تسجيل موظف جديد</h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form action="/auth/register" method="post">
                    <div class="mb-3">
                        <label class="form-label">الاسم الكامل</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" name="password" class="form-control" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">تأكيد كلمة المرور</label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-gold w-100">تسجيل</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    <a href="/auth/login">لديك حساب؟ سجل دخول</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
