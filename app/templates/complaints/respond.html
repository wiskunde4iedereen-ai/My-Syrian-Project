{% extends "layouts/base.html" %}
{% block title %}الرد على شكوى{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h4><i class="bi bi-chat-dots"></i> الرد على شكوى #{{ complaint.id }}</h4>
        <div class="card mb-3">
            <div class="card-body">
                <p><strong>المرسل:</strong> {{ complaint.sender_name }}</p>
                <p><strong>الموضوع:</strong> {{ complaint.subject }}</p>
                <p><strong>الوصف:</strong> {{ complaint.description }}</p>
            </div>
        </div>
        <form action="/complaints/{{ complaint.id }}/respond" method="post">
            <div class="mb-3">
                <label class="form-label">الرد</label>
                <textarea name="response" class="form-control" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-gov w-100">إرسال الرد</button>
        </form>
    </div>
</div>
{% endblock %}
