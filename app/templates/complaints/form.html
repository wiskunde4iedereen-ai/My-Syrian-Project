{% extends "layouts/base.html" %}
{% block title %}شكوى جديدة{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h4><i class="bi bi-chat-dots"></i> شكوى جديدة</h4>
        <form action="/complaints/create" method="post">
            <div class="mb-3">
                <label class="form-label">الاسم</label>
                <input type="text" name="sender_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">وسيلة الاتصال</label>
                <input type="text" name="sender_contact" class="form-control" placeholder="بريد إلكتروني أو هاتف">
            </div>
            <div class="mb-3">
                <label class="form-label">الموضوع</label>
                <input type="text" name="subject" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">الوصف</label>
                <textarea name="description" class="form-control" rows="4"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">القسم المعني</label>
                <select name="department_id" class="form-control">
                    <option value="0">-- اختر القسم --</option>
                    {% for d in departments %}
                    <option value="{{ d.id }}">{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-gov w-100">إرسال الشكوى</button>
        </form>
    </div>
</div>
{% endblock %}
