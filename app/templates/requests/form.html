{% extends "layouts/base.html" %}
{% block title %}طلب جديد{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h4><i class="bi bi-inbox"></i> طلب جديد</h4>
        <form action="/requests/create" method="post">
            <div class="mb-3">
                <label class="form-label">نوع الطلب</label>
                <select name="request_type" class="form-control" required>
                    <option value="">اختر النوع...</option>
                    <option value="إجازة">إجازة</option>
                    <option value="مهمة">مهمة</option>
                    <option value="موافقة">موافقة</option>
                    <option value="تعويض">تعويض</option>
                    <option value="أخرى">أخرى</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">الموضوع</label>
                <input type="text" name="subject" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">الوصف</label>
                <textarea name="description" class="form-control" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-gov w-100">إرسال الطلب</button>
        </form>
    </div>
</div>
{% endblock %}
